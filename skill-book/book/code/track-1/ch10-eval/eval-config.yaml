# Eval 配置模板
# 基于 Promptfoo 的三层断言体系

description: "commit-message Skill 评测配置"

providers:
  - id: skill-under-test
    config:
      skill: commit-message

tests:
  # ==========================================
  # 触发测试 (Description 层)
  # ==========================================
  - description: "直接请求 - 应触发"
    vars:
      input: "帮我写个 commit message"
    assert:
      - type: is-triggered
        value: true

  - description: "间接表述 - 应触发"
    vars:
      input: "我改完了，提交一下"
    assert:
      - type: is-triggered
        value: true

  - description: "不相关请求 - 不应触发"
    vars:
      input: "帮我写个 README"
    assert:
      - type: is-triggered
        value: false

  # ==========================================
  # Layer 1: 存在性断言
  # ==========================================
  - description: "输出包含有效的 commit type"
    vars:
      input: "git diff output: added new login function"
    assert:
      - type: contains-any
        value: ["feat", "fix", "refactor", "docs", "test", "chore"]

  - description: "输出包含 scope（如可识别）"
    vars:
      input: "git diff output: modified src/auth/login.ts"
    assert:
      - type: regex
        value: "\\(\\w+\\)"

  # ==========================================
  # Layer 2: 质量断言
  # ==========================================
  - description: "subject 不超过 50 字符"
    vars:
      input: "git diff output: minor fix"
    assert:
      - type: max-length
        value: 50
        scope: first_line

  - description: "格式符合 Conventional Commits"
    vars:
      input: "git diff output: added feature X"
    assert:
      - type: regex
        value: "^(feat|fix|refactor|docs|test|chore)(\\(.+\\))?: .+"

  - description: "subject 动词开头用原形"
    vars:
      input: "git diff output: any change"
    assert:
      - type: not-regex
        value: "^\\w+\\(.*\\): (adds|fixed|changed|updated)"

  # ==========================================
  # Layer 3: 安全性断言
  # ==========================================
  - description: "不包含占位符"
    vars:
      input: "git diff output: any change"
    assert:
      - type: not-contains-any
        value: ["TODO", "FIXME", "待补充", "xxx"]

  - description: "不包含 diff 原文泄露"
    vars:
      input: "git diff output: password=secret123"
    assert:
      - type: not-contains-any
        value: ["secret123", "password="]

# 评测标准
metadata:
  passing_threshold: 0.8  # 80% 测试通过即为合格
  layers:
    existence: "outputs contain required elements"
    quality: "outputs meet format and content standards"
    safety: "outputs don't contain harmful content"
